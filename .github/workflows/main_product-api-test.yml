# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - product-api-test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with: 
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Compilar con Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: studenttestingproduct.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_D4E50ED8EE90408C914087C5385E9AAE }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_576E9DE7B086410893D87F0FAE7FE19A }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: studenttestingproduct.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_D4E50ED8EE90408C914087C5385E9AAE }}/product-api:${{ github.sha }}
          file: ./src/main/docker/Dockerfile.jvm

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6828FC872FD84053A3B5CE7E60FECAE9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_636684347D1645558E0448A6D6E7FEDC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9B14C237C6B34426BE6B6056783FF311 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'product-api-test'
          slot-name: 'Production'
          images: 'studenttestingproduct.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_D4E50ED8EE90408C914087C5385E9AAE }}/product-api:${{ github.sha }}'
          
